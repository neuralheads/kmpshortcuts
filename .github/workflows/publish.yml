# Publishes KMPShortcuts to Maven Central on every version tag (e.g. v0.1.0-alpha01)
# Runs on macos-latest to compile iOS native klib targets.
#
# Required GitHub Actions secrets:
#   MAVEN_CENTRAL_USERNAME   – Sonatype Central Portal token username
#   MAVEN_CENTRAL_PASSWORD   – Sonatype Central Portal token password
#   SIGNING_KEY_BASE64       – Base64-encoded ASCII-armored GPG private key
#                              Generate: base64 -i private.key | tr -d '\n'
#   SIGNING_PASSWORD         – GPG key passphrase (empty string if no passphrase)

name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish all modules
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Decode signing key
        id: signing
        run: |
          # Decode the base64 key back to the ASCII-armored PGP key
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 --decode > /tmp/signing_key.gpg
          echo "key_path=/tmp/signing_key.gpg" >> $GITHUB_OUTPUT
          # Read the decoded key into a variable (preserving newlines via file)
          SIGNING_KEY=$(cat /tmp/signing_key.gpg)
          echo "DECODED_SIGNING_KEY<<EOF" >> $GITHUB_ENV
          cat /tmp/signing_key.gpg >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Publish to Maven Central
        run: >
          ./gradlew
          publishAllPublicationsToMavenCentralRepository
          --no-daemon
          --no-configuration-cache
        env:
          MAVEN_CENTRAL_USERNAME:                        ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD:                        ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey:         ${{ env.DECODED_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralUsername:       ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword:       ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: '**/build/reports/**'
          retention-days: 7
