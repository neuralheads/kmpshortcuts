name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish all modules
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Decode signing key
        run: |
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/signing_key.gpg"
          # Verify the key decoded correctly
          head -1 "$RUNNER_TEMP/signing_key.gpg"

      - name: Publish to Maven Central
        run: |
          # Read the decoded key into a shell variable (preserves newlines within same run block)
          SIGNING_KEY=$(cat "$RUNNER_TEMP/signing_key.gpg")
          export ORG_GRADLE_PROJECT_signingInMemoryKey="$SIGNING_KEY"

          ./gradlew \
            publishAllPublicationsToMavenCentralRepository \
            --no-daemon \
            --no-configuration-cache
        env:
          MAVEN_CENTRAL_USERNAME:                        ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD:                        ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralUsername:       ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword:       ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: '**/build/reports/**'
          retention-days: 7
